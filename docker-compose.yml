# AquaSmart — Docker Compose
# ============================================================
# One service: the Streamlit dashboard.
#
# Data and model artefacts are mounted as volumes so they persist
# across container restarts and can be (re)generated from inside
# the container via the pipeline scripts.
#
# Quick start:
#   docker compose up --build
#   # Then in another terminal, bootstrap the pipeline:
#   docker compose exec aquasmart python src/data/collect_data_v2.py
#   docker compose exec aquasmart python src/data/generate_target_v4.py
#   docker compose exec aquasmart python src/data/preprocess_v4.py
#   docker compose exec aquasmart python src/models/train_v4.py
#   # The dashboard at http://localhost:8501 will pick up the new models.
# ============================================================

services:
  aquasmart:
    build:
      context: .
      dockerfile: Dockerfile
    image: aquasmart:latest
    container_name: aquasmart_app
    ports:
      - "8501:8501"
    volumes:
      # Persist collected weather + generated datasets
      - ./data:/app/data
      # Persist trained model artefacts
      - ./models:/app/models
      # (optional) Persist generated report figures
      - ./reports:/app/reports
    environment:
      # Ensure Streamlit stays accessible from the host
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - STREAMLIT_SERVER_PORT=8501
    restart: unless-stopped
