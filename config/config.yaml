# AquaSmart — Project Configuration

project:
  name: "AquaSmart"
  version: "0.1.0"

data:
  raw_path: "data/raw/"
  processed_path: "data/processed/"
  target_column: "Water_Requirement"  # Adjust after inspecting dataset

model:
  test_size: 0.2
  random_state: 42
  algorithms:
    - "LinearRegression"
    - "RandomForestRegressor"
    - "GradientBoostingRegressor"

evaluation:
  metrics:
    - "rmse"
    - "mae"
    - "r2"
